name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Ruff lint + format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          allow-prereleases: true
      - run: pip install ruff
      - run: ruff format --check src/ tests/
      - run: ruff check src/ tests/

  typecheck:
    name: Pyrefly type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          allow-prereleases: true
      - run: pip install pyrefly
      - run: pyrefly check src/

  test:
    name: Tests with Cython (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.14"
          - os: macos-14
            python-version: "3.14"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
      - name: Install build toolchain
        run: pip install meson-python meson ninja cython>=3
      - name: Install package + test deps
        run: pip install -e ".[dev]" --no-build-isolation
      - name: Verify Cython extensions loaded
        run: |
          python -c "
          from aiobt._compiled import compilation_status
          status = compilation_status()
          print(status)
          for mod, compiled in status.items():
              assert compiled, f'{mod} should be compiled'
          print('[OK] All Cython modules compiled and loadable')
          "
      - name: Run tests
        run: python -m unittest discover tests

  test-pure-python:
    name: Tests without Cython (pure Python fallback)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-14]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          allow-prereleases: true
      - name: Install runtime deps only
        run: pip install later
      - name: Verify pure Python fallback
        shell: bash
        run: |
          PYTHONPATH=src python -c "
          from aiobt._compiled import compilation_status
          status = compilation_status()
          print(status)
          for mod, compiled in status.items():
              assert not compiled, f'{mod} should NOT be compiled in pure-Python mode'
          print('[OK] All modules running pure Python')
          "
      - name: Run tests
        shell: bash
        run: PYTHONPATH=src python -m unittest discover tests
