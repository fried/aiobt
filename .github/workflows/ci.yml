name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: Black format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true
      - run: pip install black
      - run: black --check src/ tests/

  typecheck:
    name: Pyrefly type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true
      - run: pip install pyrefly
      - run: pyrefly check src/

  test:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
      - name: Install build toolchain
        run: pip install meson-python meson ninja cython>=3
      - name: Install package + test deps
        run: pip install -e ".[dev]" --no-build-isolation
      - name: Run tests
        run: python -m unittest discover tests

  cython-build:
    name: Cython compilation + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true
      - name: Install meson toolchain
        run: pip install meson-python meson ninja cython>=3
      - name: Install package with Cython
        run: pip install -e ".[dev]" --no-build-isolation
      - name: Verify compiled bencode module loaded
        run: |
          python -c "
          from aiobt._compiled import compilation_status
          status = compilation_status()
          print(status)
          assert status['bencode'], 'bencode should be compiled'
          print('✓ Cython bencode module compiled and loadable')
          "
      - name: Run tests with compiled extensions
        run: python -m unittest discover tests
