name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write  # OIDC for trusted publishing

jobs:
  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true
      - run: pip install build meson-python meson ninja cython>=3
      - run: python -m build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: dist-sdist
          path: dist/*.tar.gz

  build-wheels:
    name: Build wheel (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
          - os: macos-14       # Apple Silicon
          - os: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true
      - name: Build wheels (cibuildwheel)
        uses: pypa/cibuildwheel@v2.23
        env:
          CIBW_BUILD: "cp314-*"
          CIBW_SKIP: "*-musllinux_*"
          CIBW_BUILD_FRONTEND: "build"
          CIBW_BEFORE_BUILD: "pip install meson-python meson ninja cython>=3"
          CIBW_TEST_REQUIRES: "later"
          CIBW_TEST_COMMAND: "python -m unittest discover {project}/tests"
      - uses: actions/upload-artifact@v4
        with:
          name: dist-wheel-${{ matrix.os }}
          path: wheelhouse/*.whl

  publish:
    name: Publish to PyPI
    needs: [build-sdist, build-wheels]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/aiobt
    permissions:
      id-token: write  # trusted publishing via OIDC
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: dist/
          merge-multiple: true
      - name: List artifacts
        run: ls -la dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
