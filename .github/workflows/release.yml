name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write  # OIDC for trusted publishing

jobs:
  lint:
    name: Ruff lint + format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true
      - run: pip install ruff
      - run: ruff format --check src/ tests/
      - run: ruff check src/ tests/

  typecheck:
    name: Pyrefly type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true
      - run: pip install pyrefly
      - run: pyrefly check src/

  build-sdist:
    name: Build source distribution
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true
      - run: pip install build meson-python meson ninja "cython>=3"
      - run: python -m build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: dist-sdist
          path: dist/*.tar.gz

  build-wheels:
    name: Build wheel (${{ matrix.os }})
    needs: [lint, typecheck]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
          - os: macos-14       # Apple Silicon
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true
      - name: Install build toolchain
        run: pip install build meson-python meson ninja "cython>=3"
      - name: Build wheel
        run: python -m build --wheel
      - name: Repair Linux wheel (manylinux tag)
        if: runner.os == 'Linux'
        run: |
          pip install auditwheel
          auditwheel repair dist/*.whl --plat manylinux_2_17_x86_64 -w dist-repaired/
          rm dist/*.whl
          mv dist-repaired/*.whl dist/
      - name: Verify wheel contents
        shell: python
        run: |
          import zipfile, glob
          wheels = glob.glob("dist/*.whl")
          assert wheels, "No wheel found"
          with zipfile.ZipFile(wheels[0]) as zf:
              names = zf.namelist()
              for mod in ("bencode", "piece", "protocol"):
                  assert any(f"{mod}.py" in n for n in names), \
                      f"{mod}.py missing from wheel -- fallback broken. Files: {names}"
                  print(f"[OK] {mod}.py present in {wheels[0]}")
              compiled = [n for n in names if any(
                  m in n for m in ("bencode", "piece", "protocol")
              ) and n.endswith((".so", ".pyd"))]
              if compiled:
                  print(f"[OK] Compiled extensions: {compiled}")
              else:
                  print("[WARN] No compiled extensions (pure-Python wheel)")
      - uses: actions/upload-artifact@v4
        with:
          name: dist-wheel-${{ matrix.os }}
          path: dist/*.whl

  test-wheel:
    name: Test wheel (${{ matrix.os }})
    needs: build-wheels
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
          - os: macos-14
    steps:
      - uses: actions/checkout@v4  # for tests/
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true
      - uses: actions/download-artifact@v4
        with:
          name: dist-wheel-${{ matrix.os }}
          path: dist/
      - name: Install wheel + test deps
        shell: bash
        run: |
          pip install dist/*.whl
          pip install later
      - name: Verify compilation status
        shell: python
        run: |
          from aiobt._compiled import compilation_status
          status = compilation_status()
          print(f"Compilation status: {status}")
          for mod, compiled in status.items():
              if compiled:
                  print(f"[OK] {mod} running compiled")
              else:
                  print(f"[WARN] {mod} running pure Python fallback")
      - name: Run tests
        run: python -m unittest discover tests

  publish:
    name: Publish to PyPI
    needs: [build-sdist, build-wheels, test-wheel]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/aiobt
    permissions:
      id-token: write  # trusted publishing via OIDC
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: dist/
          merge-multiple: true
      - name: List artifacts
        run: ls -la dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
